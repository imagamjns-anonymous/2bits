<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="url(#logoGradient)" filter="url(#glow)"/>

  <!-- Inner glass effect -->
  <rect x="5" y="5" width="90" height="90" rx="22" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- "2" shape -->
  <path d="M 30 35 L 70 35 L 70 45 L 42 45 L 70 45 L 70 55 L 30 55 L 30 45 L 58 45 L 30 45 L 30 35"
        fill="white" opacity="0.95"/>

  <!-- "Bits" text -->
  <text x="50" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700"
        fill="white" text-anchor="middle" letter-spacing="1">BITS</text>
</svg>
